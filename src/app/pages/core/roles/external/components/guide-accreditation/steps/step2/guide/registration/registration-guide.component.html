<app-requirement (dataOut)="saveForm($event,'processGuides')" />

<app-protected-area
    [classification]="{}"
    (dataOut)="saveForm($event,'protectedArea')" />

<app-adventure-tourism-modality
    [classification]="formStateService.process()?.classification!"
    (dataOut)="saveForm($event,'adventureModality')" />

<app-language
    [classification]="{}"
    (dataOut)="saveForm($event,'language')" />


<div class="custom-form-card">
    <div class="custom-form-grid md:grid-cols-12">
        <div class="md:col-span-3 custom-form-field">
            <p-button
                label="Atrás"
                severity="warn"
                styleClass="w-full"
                [icon]="PrimeIcons.ARROW_LEFT"
                (onClick)="back()" />
        </div>

        <div class="custom-form-field md:col-start-10 md:col-span-3">
            <p-button
                class="w-full"
                label="Guardar"
                styleClass="w-full"
                [icon]="PrimeIcons.SAVE"
                (onClick)="onSubmit()" />
        </div>
    </div>
</div>
