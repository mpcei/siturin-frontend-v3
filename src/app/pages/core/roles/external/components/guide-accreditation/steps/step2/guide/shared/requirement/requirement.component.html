<div class="custom-form-card">
    <form [formGroup]="form" class="custom-form-grid md:grid-cols-12">
        <!-- title -->
        <div class="custom-form-title md:col-span-12">
            <h4>
                REQUISITOS PARA LA EMISIÓN DE REGISTRO DE TURISMO PARA
                "GUÍA DE TURISMO LOCAL POR PRIMERA VEZ"
            </h4>
        </div>

        <!-- ruc -->
        <div class="custom-form-field md:col-span-12">
            <label
                appLabel
                for="ruc"
                [required]="rucField">
                <span [innerHTML]="requirementItems.get('ruc')?.name"></span>
            </label>

            <p-fileupload
                id="file"
                name="ruc"
                mode="basic"
                chooseLabel="Buscar RUC"
                [chooseIcon]="PrimeIcons.SEARCH"
                uploadLabel="Subir archivo"
                accept="application/pdf"
                [maxFileSize]="10485760"
                [auto]="true"
                [customUpload]="true"
                (uploadHandler)="onFileSelect(requirementItems.get('ruc'),$event)">
            </p-fileupload>

            @if (rucField.value) {
                <p-message severity="info">
                    {{ rucField.value.file.name | json }}
                </p-message>
            }

            <small
                appErrorMessage
                [errors]="rucField.errors"
                [touched]="rucField.touched"
                [dirty]="rucField.dirty"></small>
        </div>

        <!-- photo -->
        <div class="custom-form-field md:col-span-12">
            <label
                appLabel
                for="photo"
                [required]="photoField">
                <div [innerHTML]="requirementItems.get('photo')?.name"></div>
            </label>

            <p-fileupload
                id="photo"
                name="photo"
                mode="basic"
                chooseLabel="Buscar fotografía"
                [chooseIcon]="PrimeIcons.SEARCH"
                uploadLabel="Subir archivo"
                accept="image/*"
                [maxFileSize]="10485760"
                [auto]="true"
                [customUpload]="true"
                (uploadHandler)="onFileSelect(requirementItems.get('photo'),$event)">
            </p-fileupload>

            @if (photoField.value) {
                <img [src]="photoField.value.img" width="300px" alt="">
                <p-message severity="info">
                    {{ photoField.value.file.name | json }}
                </p-message>
            }

            <small
                appErrorMessage
                [errors]="photoField.errors"
                [touched]="photoField.touched"
                [dirty]="photoField.dirty"></small>
        </div>
    </form>
</div>
