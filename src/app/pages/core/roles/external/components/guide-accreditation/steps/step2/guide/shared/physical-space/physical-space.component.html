<div class="custom-form-card">
    <form [formGroup]="form" class="custom-form-grid md:grid-cols-12">
        <!-- ruc -->
        <div class="md:col-span-12 custom-form-field">
            <label
                appLabel
                for="ruc"
                [required]="rucField">
                Registro Único de Contribuyentes (RUC) u otro que determine la Autoridad Nacional Tributaria, en
                el que conste como actividad económica la guianza turística.
            </label>

            <p-fileupload
                id="file"
                name="ruc"
                mode="basic"
                chooseLabel="Buscar RUC"
                [chooseIcon]="PrimeIcons.SEARCH"
                uploadLabel="Subir archivo"
                accept="application/pdf"
                [maxFileSize]="10485760"
                [auto]="true"
                [customUpload]="true"
                (uploadHandler)="onFileSelect('ruc',$event)">
            </p-fileupload>

            @if (rucField.value) {
                {{ rucField.value.file.name | json }}
            }

            <small
                appErrorMessage
                [errors]="rucField.errors"
                [touched]="rucField.touched"
                [dirty]="rucField.dirty"></small>
        </div>

        <!-- photo -->
        <div class="md:col-span-12 custom-form-field">
            <label
                appLabel
                for="photo"
                [required]="photoField">
                Fotografía emitida en los últimos 6 meses, con las siguientes características:
                <ul class="list-disc pl-5">
                    <li>Rostro (cabeza recta, mirando al frente)</li>
                    <li>Tipo carné (dimensiones: 30 milímetros de ancho x 45 milímetros de alto)</li>
                    <li>Fondo blanco</li>
                    <li>Sin accesorios (gorra, sombrero, gafas, lentes, joyas, entre otros)</li>
                    <li>Cabello recogido</li>
                    <li>Máximo 1 megabyte de peso</li>
                </ul>
            </label>

            <p-fileupload
                id="photo"
                name="photo"
                mode="basic"
                chooseLabel="Buscar fotografía"
                [chooseIcon]="PrimeIcons.SEARCH"
                uploadLabel="Subir archivo"
                accept="image/*"
                [maxFileSize]="10485760"
                [auto]="true"
                [customUpload]="true"
                (uploadHandler)="onFileSelect('photo',$event)">
            </p-fileupload>

            @if (photoField.value) {
                {{ photoField.value.file.name | json }}
            }

            <small
                appErrorMessage
                [errors]="photoField.errors"
                [touched]="photoField.touched"
                [dirty]="photoField.dirty"></small>
        </div>
    </form>
</div>
