@switch (processTypeCode()) {
    @case (CatalogueProcessesTypeEnum.registration) {
        @switch (formStateService.catastroSiete()?.type) {
            @case ('new') {
                <app-registration (step)="$event" />
            }
            @case ('current') {
                <app-registration-guide-current (step)="$event" />
            }
            @case ('expired') {
                <app-registration-guide-expired (step)="$event" />
            }
        }

    }

    @case (CatalogueProcessesTypeEnum.new_classification_update) {
        <app-registration (step)="$event" />
    }
}
