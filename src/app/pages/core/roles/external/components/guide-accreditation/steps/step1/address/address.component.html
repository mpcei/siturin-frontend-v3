<form [formGroup]="form" class="custom-form-card">
    <div class="custom-form-grid md:grid-cols-12">
        <!-- Section Name -->
        <div class="custom-form-title md:col-span-12">
            DATOS DE UBICACIÓN DE DOMICILIO/ RESIDENCIA DEL GUÍA DE TURISMO:
        </div>

        <!-- provinceId -->
        <div class="custom-form-field md:col-span-4">
            <label
                appLabel
                for="provinceId"
                label="Provincia"
                [required]="provinceIdField">
            </label>

            <p-select
                id="provinceId"
                formControlName="provinceId"
                [options]="provinces"
                optionValue="id"
                optionLabel="name"
                appendTo="body"
                [filter]="true"
                filterBy="name"
                placeholder="Seleccione una provincia" />

            <small
                appErrorMessage
                [dirty]="provinceIdField.dirty"
                [errors]="provinceIdField.errors"
                [touched]="provinceIdField.touched"></small>
        </div>

        <!-- cantonId -->
        @if (provinceIdField.value) {
            <div class="custom-form-field md:col-span-4">
                <label
                    appLabel
                    for="cantonId"
                    [required]="cantonIdField"
                    label="Cantón">
                </label>

                <p-select
                    id="cantonId"
                    formControlName="cantonId"
                    [options]="cantons"
                    optionValue="id"
                    optionLabel="name"
                    appendTo="body"
                    [filter]="true"
                    filterBy="name"
                    placeholder="Seleccione un cantón" />

                <small
                    appErrorMessage
                    [dirty]="cantonIdField.dirty"
                    [errors]="cantonIdField.errors"
                    [touched]="cantonIdField.touched"></small>
            </div>
        }

        <!-- parishId -->
        @if (cantonIdField.value) {
            <div class="custom-form-field md:col-span-4">
                <label
                    appLabel
                    for="parishId"
                    label="Parroquia"
                    [required]="parishIdField">
                </label>

                <p-select
                    id="parishId"
                    formControlName="parishId"
                    [options]="parishes"
                    optionValue="id"
                    optionLabel="name"
                    appendTo="body"
                    [filter]="true"
                    filterBy="name"
                    placeholder="Seleccione una parroquia">
                    <ng-template #item let-item>
                        {{ item.name }} ({{ item.zoneType }})
                    </ng-template>

                    <ng-template #selectedItem let-selectedItem>
                        {{ selectedItem.name }} ({{ selectedItem.zoneType }})
                    </ng-template>
                </p-select>

                <small
                    appErrorMessage
                    [dirty]="parishIdField.dirty"
                    [errors]="parishIdField.errors"
                    [touched]="parishIdField.touched"></small>
            </div>
        }

        <!-- mainStreet -->
        <div class="md:col-span-4 custom-form-field">
            <label
                appLabel
                for="mainStreet"
                label="Calle Principal"
                [required]="mainStreetField">
            </label>

            <input
                pInputText
                id="mainStreet"
                formControlName="mainStreet" />

            <small
                appErrorMessage
                [dirty]="mainStreetField.dirty"
                [errors]="mainStreetField.errors"
                [touched]="mainStreetField.touched"></small>
        </div>

        <!-- numberStreet -->
        <div class="md:col-span-4 custom-form-field">
            <label
                appLabel
                for="numberStreet"
                label="Numeración"
                [required]="numberStreetField">
            </label>

            <input
                pInputText
                id="numberStreet"
                formControlName="numberStreet" />

            <small
                appErrorMessage
                [dirty]="numberStreetField.dirty"
                [errors]="numberStreetField.errors"
                [touched]="numberStreetField.touched"></small>
        </div>

        <!-- secondaryStreet -->
        <div class="md:col-span-4 custom-form-field">
            <label
                appLabel
                for="secondaryStreet"
                label="Calle Intersección"
                [required]="secondaryStreetField">
            </label>

            <input
                pInputText
                id="secondaryStreet"
                formControlName="secondaryStreet" />

            <small
                appErrorMessage
                [dirty]="secondaryStreetField.dirty"
                [errors]="secondaryStreetField.errors"
                [touched]="secondaryStreetField.touched"></small>
        </div>

        <!-- referenceStreet -->
        <div class="md:col-span-12 custom-form-field">
            <label
                appLabel
                for="referenceStreet"
                label="Referencia de Ubicación"
                [required]="referenceStreetField">
            </label>

            <textarea
                pTextarea
                id="referenceStreet"
                formControlName="referenceStreet">
                </textarea>

            <small
                appErrorMessage
                [dirty]="referenceStreetField.dirty"
                [errors]="referenceStreetField.errors"
                [touched]="referenceStreetField.touched"></small>
        </div>

        <!-- map -->
        @if (parishIdField.value) {
            <div class="md:col-span-12 custom-form-field">
                <app-map
                    (dataOut)="setlatLng($event)"
                    [latitude]="parishIdField.value?.latitude"
                    [longitude]="parishIdField.value?.longitude" />
            </div>
        }
    </div>
</form>
