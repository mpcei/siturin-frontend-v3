<form [formGroup]="form" class="custom-form-card">
    <div class="custom-form-grid md:grid-cols-12">
        <!-- Section Name -->
        <div class="custom-form-title md:col-span-12">
            DATOS DE UBICACIÓN DE DOMICILIO/ RESIDENCIA DEL GUÍA DE TURISMO:
        </div>

        <!-- province -->
        <div class="custom-form-field md:col-span-4">
            <label
                appLabel
                for="province"
                label="Provincia"
                [required]="provinceField">
            </label>

            <p-select
                id="province"
                formControlName="province"
                [options]="provinces()"
                optionLabel="name"
                appendTo="body"
                [filter]="true"
                filterBy="name"
                placeholder="Seleccione una provincia" />

            <small
                appErrorMessage
                [dirty]="provinceField.dirty"
                [errors]="provinceField.errors"
                [touched]="provinceField.touched"></small>
        </div>

        <!-- canton -->
        <div class="custom-form-field md:col-span-4">
            <label
                appLabel
                for="canton"
                [required]="cantonField"
                label="Cantón">
            </label>

            <p-select
                id="canton"
                formControlName="canton"
                [options]="cantons"
                optionLabel="name"
                appendTo="body"
                [filter]="true"
                filterBy="name"
                placeholder="Seleccione un cantón"
                emptyMessage="Debe seleccionar una provincia" />

            <small
                appErrorMessage
                [dirty]="cantonField.dirty"
                [errors]="cantonField.errors"
                [touched]="cantonField.touched"></small>
        </div>

        <!-- parish -->
        <div class="custom-form-field md:col-span-4">
            <label
                appLabel
                for="parish"
                label="Parroquia"
                [required]="parishField">
            </label>

            <p-select
                id="parish"
                formControlName="parish"
                [options]="parishes"
                optionLabel="name"
                appendTo="body"
                [filter]="true"
                filterBy="name"
                placeholder="Seleccione una parroquia"
                emptyMessage="Debe seleccionar un cantón">
                <ng-template #item let-item>
                    {{ item.name }} ({{ item.zoneType }})
                </ng-template>

                <ng-template #selectedItem let-selectedItem>
                    {{ selectedItem.name }} ({{ selectedItem.zoneType }})
                </ng-template>
            </p-select>

            <small
                appErrorMessage
                [dirty]="parishField.dirty"
                [errors]="parishField.errors"
                [touched]="parishField.touched"></small>
        </div>

        <!-- mainStreet -->
        <div class="md:col-span-5 custom-form-field">
            <label
                appLabel
                for="mainStreet"
                label="Calle Principal"
                [required]="mainStreetField">
            </label>

            <input
                pInputText
                id="mainStreet"
                formControlName="mainStreet" />

            <small
                appErrorMessage
                [dirty]="mainStreetField.dirty"
                [errors]="mainStreetField.errors"
                [touched]="mainStreetField.touched"></small>
        </div>

        <!-- secondaryStreet -->
        <div class="md:col-span-5 custom-form-field">
            <label
                appLabel
                for="secondaryStreet"
                label="Calle Intersección"
                [required]="secondaryStreetField">
            </label>

            <input
                pInputText
                id="secondaryStreet"
                formControlName="secondaryStreet" />

            <small
                appErrorMessage
                [dirty]="secondaryStreetField.dirty"
                [errors]="secondaryStreetField.errors"
                [touched]="secondaryStreetField.touched"></small>
        </div>

        <!-- numberStreet -->
        <div class="md:col-span-2 custom-form-field">
            <label
                appLabel
                for="numberStreet"
                label="Numeración"
                [required]="numberStreetField">
            </label>

            <input
                pInputText
                id="numberStreet"
                formControlName="numberStreet" />

            <small
                appErrorMessage
                [dirty]="numberStreetField.dirty"
                [errors]="numberStreetField.errors"
                [touched]="numberStreetField.touched"></small>
        </div>

        <!-- referenceStreet -->
        <div class="md:col-span-12 custom-form-field">
            <label
                appLabel
                for="referenceStreet"
                label="Referencia de Ubicación"
                [required]="referenceStreetField">
            </label>

            <textarea
                pTextarea
                id="referenceStreet"
                formControlName="referenceStreet">
                </textarea>

            <small
                appErrorMessage
                [dirty]="referenceStreetField.dirty"
                [errors]="referenceStreetField.errors"
                [touched]="referenceStreetField.touched"></small>
        </div>

        <!-- map -->
        @if (parishField.value) {
            <div class="md:col-span-12 custom-form-field">
                <app-map
                    (dataOut)="setLatLng($event)"
                    [latitude]="parishField.value?.latitude"
                    [longitude]="parishField.value?.longitude" />
            </div>
        }
    </div>
</form>
