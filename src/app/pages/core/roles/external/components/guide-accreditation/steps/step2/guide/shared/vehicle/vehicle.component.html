<div class="custom-form-card">
    <form [formGroup]="form" class="custom-form-grid md:grid-cols-12">
        <!-- title -->
        <div class="custom-form-title md:col-span-12">
            <h6>REQUISITOS PARA LOS GUÍAS DE TURISMO NACIONALES ESPECIALIZADOS EN AVENTURA DE MEDIA O ALTA
                MONTAÑA QUE TRASLADEN A TURISTAS O VISITANTES EN SU VEHÍCULO PROPIO </h6>
        </div>

        <!-- hasAdventureTourismModality -->
        <div class="custom-form-field md:col-span-12">
            <label appLabel for="hasVehicle"
                   [required]="hasVehicleField">
                <div [innerHTML]="requirementField.value?.name"></div>
            </label>

            <app-toggle-switch id="hasVehicle" formControlName="hasVehicle" />

            <p-message
                appErrorMessage
                [errors]="hasVehicleField.errors"
                [touched]="hasVehicleField.touched"
                [dirty]="hasVehicleField.dirty"
            />
        </div>

    </form>
</div>


@if (hasVehicleField.value) {
    <div class="custom-form-card">
        <app-list-basic
            title="Vehículos"
            [items]="items"
            [cols]="cols"
            [buttonActions]="buttonActions"
            (onCreate)="isVisibleModal = true"
            (onSelect)="onSelect($event)"
        />
    </div>
}

<p-dialog
    [(visible)]="isVisibleModal"
    [modal]="true"
    [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }"
    [style]="{ width: '40vw' }"
    [draggable]="false"
    (onHide)="closeModal()"
    [resizable]="false"
>
    <ng-template #header>
        <div class="inline-flex items-center justify-center gap-2">
            <span class="font-bold whitespace-nowrap">Agregar Modalidad</span>
        </div>
    </ng-template>

    <div class="custom-form-card">
        <form [formGroup]="vehicleForm" class="custom-form-grid md:grid-cols-12" (ngSubmit)="onSubmit()">
            <!-- plate -->
            <div class="md:col-span-12 flex flex-col gap-2">
                <label
                    appLabel
                    for="modality"
                    label="Modalidad"
                    [required]="plateField"></label>

                <input pInputText id="plate" formControlName="plate">

                <small
                    appErrorMessage
                    [errors]="plateField.errors"
                    [touched]="plateField.touched"
                    [dirty]="plateField.dirty"></small>
            </div>

            <!-- type -->
            <div class="md:col-span-12 flex flex-col gap-2">
                <label
                    appLabel for="type"
                    [required]="typeField"
                    label="Organismos Certificadores de Habilidad Acreditados"></label>

                <p-select
                    id="certifier"
                    formControlName="type"
                    [options]="types"
                    optionLabel="name"
                    appendTo="body" />

                <small
                    appErrorMessage
                    [errors]="typeField.errors"
                    [touched]="typeField.touched"
                    [dirty]="typeField.dirty"></small>
            </div>

            <!-- year -->
            <div class="md:col-span-12 flex flex-col gap-2">
                <label
                    appLabel for="year"
                    [required]="yearField"
                    label="Organismos Certificadores de Habilidad Acreditados"></label>

                <p-inputNumber id="year" formControlName="year"/>

                <small
                    appErrorMessage
                    [errors]="typeField.errors"
                    [touched]="typeField.touched"
                    [dirty]="typeField.dirty"></small>
            </div>

            <!-- ruc -->
            <div class="custom-form-field md:col-span-12">
                <label
                    appLabel
                    for="ruc"
                    [required]="fileField"
                    label="Certificación de habilidad o el certificado de aprobación del curso de capacitación específico de aventura de la modalidad referida">
                </label>

                <p-fileupload
                    id="file"
                    name="file"
                    mode="basic"
                    chooseLabel="Buscar archivo"
                    [chooseIcon]="PrimeIcons.SEARCH"
                    uploadLabel="Subir archivo"
                    accept="application/pdf"
                    [maxFileSize]="10485760"
                    [auto]="true"
                    [customUpload]="true"
                    (uploadHandler)="onFileSelect('',$event)">
                </p-fileupload>

                @if (fileField.value) {
                    <p-message severity="info">
                        {{ fileField.value.name | json }}
                    </p-message>
                }

                <small
                    appErrorMessage
                    [errors]="fileField.errors"
                    [touched]="fileField.touched"
                    [dirty]="fileField.dirty"></small>
            </div>

            <!-- Action Buttons -->
            <div class="custom-form-field md:col-span-12">
                <p-button
                    type="submit"
                    label="Agregar"
                    severity="success"
                    styleClass="w-full"
                    [icon]="PrimeIcons.PLUS" />
            </div>
        </form>
    </div>
</p-dialog>

<app-button-action
    [buttonActions]="buttonActions"
    [enabled]="isButtonActionsEnabled"
    (isHide)="isButtonActionsEnabled = $event">
</app-button-action>
